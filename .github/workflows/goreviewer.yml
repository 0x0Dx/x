name: GoReviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

concurrency:
  group:
    ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name == 'pull_request_review_comment' && 'pr_comment' || github.event_name == 'issue_comment' && 'issue_comment' || 'pr' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  goreviewer:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/goreviewer')) ||
      (github.event_name == 'pull_request_review_comment' && startsWith(github.event.comment.body, '/goreviewer'))
    steps:
      - name: GoReviewer
        uses: 0x0Dx/x/goreviewer@feat/support-comment-replies
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
