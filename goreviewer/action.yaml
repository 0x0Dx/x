name: "AI Code Reviewer"
description: "AI-powered code reviewer using OpenRouter API"
author: "0x0Dx"
branding:
  icon: "message-square"
  color: "purple"

inputs:
  github_token:
    description: "GitHub token for posting comments and labels"
    required: true
    default: "${{ github.token }}"
  openrouter_api_key:
    description: "OpenRouter API key for AI review"
    required: true
  model:
    description: "AI model to use"
    required: false
    default: "minimax/minimax-m2.5"
  temperature:
    description: "Sampling temperature"
    required: false
    default: "0.1"
  max_tokens:
    description: "Maximum tokens in response"
    required: false
    default: "64000"
  max_diff_size:
    description: "Maximum diff size in bytes"
    required: false
    default: "800000"
  exclude_patterns:
    description: "File patterns to exclude (comma-separated)"
    required: false
    default: "*.lock,*.min.js,*.min.css,package-lock.json,yarn.lock"
  fail_on_requested_changes:
    description: "Fail workflow if AI requests changes"
    required: false
    default: "false"
  debug_mode:
    description: "Enable debug output"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        fetch-depth: 0

    - name: Determine event type
      id: event
      shell: bash
      run: |
        EVENT_TYPE="${{ github.event_name }}"
        echo "type=$EVENT_TYPE" >> "$GITHUB_OUTPUT"
        if [ "$EVENT_TYPE" = "pull_request_review_comment" ] || [ "$EVENT_TYPE" = "issue_comment" ]; then
          COMMENT_BODY="${{ github.event.comment.body }}"
          echo "comment_body=$COMMENT_BODY" >> "$GITHUB_OUTPUT"
        fi

    - name: Get PR diff
      if: github.event_name == 'pull_request_target'
      shell: bash
      run: |
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        git fetch origin "$BASE_REF"
        git diff "origin/$BASE_REF"...HEAD --no-color > diff.txt

    - name: Setup goreviewer
      shell: bash
      run: |
        go install github.com/0x0Dx/x/goreviewer@latest

    - name: Run AI Code Review
      if: github.event_name == 'pull_request_target'
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENROUTER_API_KEY: "${{ inputs.openrouter_api_key }}"
        MODEL: "${{ inputs.model }}"
        TEMPERATURE: "${{ inputs.temperature }}"
        MAX_TOKENS: "${{ inputs.max_tokens }}"
        MAX_DIFF_SIZE: "${{ inputs.max_diff_size }}"
        EXCLUDE_PATTERNS: "${{ inputs.exclude_patterns }}"
        PR_NUMBER: "${{ github.event.pull_request.number }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        DEBUG_MODE: "${{ inputs.debug_mode }}"
        FAIL_ON_REQUESTED_CHANGES: "${{ inputs.fail_on_requested_changes }}"
      run: |
        set +e

        if [ -n "$EXCLUDE_PATTERNS" ]; then
          FILTERED_DIFF=$(mktemp)
          PATTERN=$(echo "$EXCLUDE_PATTERNS" | sed 's/,/|/g')
          grep -v -E "diff --git a/($PATTERN) " diff.txt > "$FILTERED_DIFF" 2>/dev/null || true
          if [ -s "$FILTERED_DIFF" ]; then
            cat "$FILTERED_DIFF" > diff.txt
          fi
          rm -f "$FILTERED_DIFF"
        fi

        AI_RESPONSE=$(cat diff.txt | goreviewer review --model "$MODEL" --temperature "$TEMPERATURE" --max-tokens "$MAX_TOKENS")
        EXIT_CODE=$?

        if [ "$DEBUG_MODE" = "true" ]; then
          echo "=== RAW AI RESPONSE ==="
          echo "$AI_RESPONSE"
          echo "=== EXIT CODE: $EXIT_CODE ==="
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ AI reviewer failed with exit code $EXIT_CODE"
          echo "Response: $AI_RESPONSE"
          echo "$AI_RESPONSE" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F - 2>/dev/null || true
          exit 1
        fi

        if [ -z "$AI_RESPONSE" ]; then
          echo "❌ AI response is empty"
          exit 1
        fi

        if ! echo "$AI_RESPONSE" | jq . >/dev/null 2>&1; then
          echo "⚠️ AI response is not valid JSON"
          echo "AI response could not be processed" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F - 2>/dev/null || true
          exit 1
        fi

        REVIEW=$(echo "$AI_RESPONSE" | jq -r '.review // "No review provided"')
        DECISION=$(echo "$AI_RESPONSE" | jq -r '.fail_pass_workflow // "uncertain"' | tr -d '\n\r' | xargs)

        echo "$REVIEW" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F -

        for label in $(echo "$AI_RESPONSE" | jq -r '.labels_added[]? // empty' 2>/dev/null); do
          if [ -n "$label" ]; then
            gh label create "$label" --color "0366d6" --description "AI reviewer" 2>/dev/null || true
            gh issue edit "$PR_NUMBER" --add-label "$label" 2>/dev/null || true
          fi
        done

        echo "DECISION=$DECISION" >> "$GITHUB_OUTPUT"

        echo "✅ AI review completed. Decision: $DECISION"

    - name: Respond to @mention
      if: github.event_name == 'pull_request_review_comment' || github.event_name == 'issue_comment'
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENROUTER_API_KEY: "${{ inputs.openrouter_api_key }}"
        MODEL: "${{ inputs.model }}"
        TEMPERATURE: "${{ inputs.temperature }}"
        MAX_TOKENS: "${{ inputs.max_tokens }}"
        COMMENT_BODY: "${{ steps.event.outputs.comment_body }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        DEBUG_MODE: "${{ inputs.debug_mode }}"
      run: |
        set +e

        if [[ "$COMMENT_BODY" != *"@goreviewer"* ]]; then
          echo "No @goreviewer mention found, skipping"
          exit 0
        fi

        MESSAGE=$(echo "$COMMENT_BODY" | sed 's/.*@goreviewer//' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')

        if [ -z "$MESSAGE" ]; then
          echo "No message after @goreviewer mention"
          exit 0
        fi

        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          PR_NUMBER="${{ github.event.issue.number }}"
        else
          PR_NUMBER="${{ github.event.pull_request.number }}"
        fi
        COMMENT_ID="${{ github.event.comment.id }}"

        AI_RESPONSE=$(echo "$MESSAGE" | goreviewer comment --message "$MESSAGE" --comment-id "$COMMENT_ID")
        EXIT_CODE=$?

        if [ "$DEBUG_MODE" = "true" ]; then
          echo "=== RAW AI RESPONSE ==="
          echo "$AI_RESPONSE"
          echo "=== EXIT CODE: $EXIT_CODE ==="
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ AI response failed with exit code $EXIT_CODE"
          exit 1
        fi

        if [ -z "$AI_RESPONSE" ]; then
          echo "❌ AI response is empty"
          exit 1
        fi

        echo "$AI_RESPONSE" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F -

        echo "✅ AI response posted"

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f diff.txt
