name: GoReviewer
description: "AI-powered code reviewer using OpenAI API"
branding:
  icon: "git-merge"
  color: "purple"
author: "0x0Dx"

inputs:
  github_token:
    required: false
    description: "GitHub token for posting comments"
    default: "${{ github.token }}"
  openai_api_key:
    required: true
    description: "OpenAI API key"
    default: ""
  debug:
    required: false
    description: "Enable debug mode"
    default: "false"
  max_files:
    required: false
    description: "Max files to summarize and review"
    default: "150"
  review_simple_changes:
    required: false
    description: "Review even when changes are simple"
    default: "false"
  review_comment_lgtm:
    required: false
    description: "Leave comments on LGTM reviews"
    default: "false"
  path_filters:
    required: false
    description: "Path filters for files to review"
    default: ""
  disable_review:
    required: false
    description: "Only provide summary"
    default: "false"
  disable_release_notes:
    required: false
    description: "Disable release notes"
    default: "false"
  openai_base_url:
    required: false
    description: "OpenAI API base URL"
    default: "https://api.openai.com/v1"
  openai_light_model:
    required: false
    description: "Model for light tasks"
    default: "gpt-3.5-turbo"
  openai_heavy_model:
    required: false
    description: "Model for heavy tasks"
    default: "gpt-4"
  openai_model_temperature:
    required: false
    description: "Temperature for model"
    default: "0.05"
  openai_retries:
    required: false
    description: "Number of retries"
    default: "5"
  openai_timeout_ms:
    required: false
    description: "Timeout in milliseconds"
    default: "360000"
  system_message:
    required: false
    description: "Custom system message"
    default: ""
  summarize:
    required: false
    description: "Summarize prompt"
    default: ""
  summarize_release_notes:
    required: false
    description: "Release notes prompt"
    default: ""
  language:
    required: false
    description: "Response language"
    default: "en-US"
  bot_icon:
    required: false
    description: "Bot icon (emoji or <img> tag)"
    default: ""
  fail_on_requested_changes:
    required: false
    description: "Fail workflow if AI requests changes"
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: goreviewer:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Get PR number
      id: get_pr
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "COMMENT_BODY=${{ github.event.comment.body }}" >> $GITHUB_OUTPUT
        else
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "COMMENT_BODY=" >> $GITHUB_OUTPUT
        fi

    - name: Get PR diff
      id: get_diff
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        PR_NUMBER="${{ steps.get_pr.outputs.PR_NUMBER }}"
        REPO_FULL="${{ github.repository }}"
        
        BASE_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json baseRefName -q .baseRefName)
        HEAD_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json headRefName -q .headRefName)
        
        git fetch origin $BASE_REF $HEAD_REF
        git diff origin/$BASE_REF..origin/$HEAD_REF --no-color > diff.txt
        
        if [ ! -s diff.txt ]; then
          echo "DIFF_EMPTY=true" >> $GITHUB_OUTPUT
        else
          echo "DIFF_EMPTY=false" >> $GITHUB_OUTPUT
        fi

    - name: Run review
      if: steps.get_diff.outputs.DIFF_EMPTY == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        PR_NUMBER: ${{ steps.get_pr.outputs.PR_NUMBER }}
        REPO_FULL_NAME: ${{ github.repository }}
        DEBUG: ${{ inputs.debug }}
      run: |
        docker run --rm \
          -e GITHUB_TOKEN \
          -e OPENAI_API_KEY \
          -e PR_NUMBER \
          -e REPO_FULL_NAME \
          -e DEBUG \
          -v ${{ github.workspace }}:/workspace \
          --network host \
          goreviewer:latest \
          /bin/sh -c 'cd /workspace && ./goreviewer run \
            --pr $PR_NUMBER \
            --repo $REPO_FULL_NAME \
            --light-model ${{ inputs.openai_light_model }} \
            --heavy-model ${{ inputs.openai_heavy_model }} \
            --system-message "${{ inputs.system_message }}" \
            --language ${{ inputs.language }} \
            --openai-base-url ${{ inputs.openai_base_url }} \
            --bot-icon "${{ inputs.bot_icon }}" < diff.txt'
