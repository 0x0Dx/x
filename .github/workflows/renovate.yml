name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: renovatebot/github-action@v46.1.2
        with:
          configurationFile: ./github/renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
          