name: GoReviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  goreviewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./goreviewer/
        with:
          debug: true
          review_comment_lgtm: false
          openai_base_url: https://openrouter.ai/api/v1
          openai_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          openai_light_model: arcee-ai/trinity-mini:free
          openai_heavy_model: arcee-ai/trinity-large-preview:free
          github_token: ${{ secrets.GITHUB_TOKEN }}
