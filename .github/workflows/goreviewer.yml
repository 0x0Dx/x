name: GoReviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  goreviewer:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/goreviewer'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: goreviewer/Dockerfile
          push: false
          tags: goreviewer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get PR info
        id: get_pr
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "comment_body=${{ github.event.comment.body }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "comment_body=" >> $GITHUB_OUTPUT
          fi

      - name: Get PR diff
        id: get_diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.get_pr.outputs.pr_number }}"
          REPO_FULL="${{ github.repository }}"
          
          BASE_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json baseRefName -q .baseRefName)
          HEAD_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json headRefName -q .headRefName)
          
          git fetch origin $BASE_REF $HEAD_REF
          git diff origin/$BASE_REF..origin/$HEAD_REF --no-color > diff.txt
          
          if [ ! -s diff.txt ]; then
            echo "diff_empty=true" >> $GITHUB_OUTPUT
          else
            echo "diff_empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Run goreviewer
        if: steps.get_diff.outputs.diff_empty == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e OPENAI_API_KEY \
            -e PR_NUMBER=${{ steps.get_pr.outputs.pr_number }} \
            -e REPO_FULL_NAME=${{ github.repository }} \
            -e DEBUG=true \
            -v ${{ github.workspace }}:/workspace \
            --network host \
            goreviewer:latest \
            /bin/sh -c 'cd /workspace && ./goreviewer run --pr $PR_NUMBER --repo $REPO_FULL_NAME --light-model arcee-ai/trinity-mini:free --heavy-model arcee-ai/trinity-large-preview:free --language en-US --openai-base-url https://openrouter.ai/api/v1 < diff.txt'
