name: "AI Code Reviewer"
description: "AI-powered code reviewer using OpenAI API"
branding:
  icon: "git-merge"
  color: "purple"
author: "0x0Dx"

inputs:
  github_token:
    required: false
    description: "GitHub token for posting comments"
    default: "${{ github.token }}"
  openai_api_key:
    required: false
    description: "OpenAI API key"
    default: "${{ secrets.OPENAI_API_KEY }}"
  debug:
    required: false
    description: "Enable debug mode"
    default: "false"
  max_files:
    required: false
    description: "Max files to summarize and review"
    default: "150"
  review_simple_changes:
    required: false
    description: "Review even when the changes are simple"
    default: "false"
  review_comment_lgtm:
    required: false
    description: "Leave comments even if the patch is LGTM"
    default: "false"
  path_filters:
    required: false
    description: "Path filters"
    default: ""
  disable_review:
    required: false
    description: "Only provide the summary and skip the code review"
    default: "false"
  disable_release_notes:
    required: false
    description: "Disable release notes"
    default: "false"
  openai_base_url:
    required: false
    description: "The url of the openai api interface"
    default: "https://api.openai.com/v1"
  openai_light_model:
    required: false
    description: "Model to use for simple tasks"
    default: "gpt-3.5-turbo"
  openai_heavy_model:
    required: false
    description: "Model to use for complex tasks"
    default: "gpt-4"
  openai_model_temperature:
    required: false
    description: "Temperature for GPT model"
    default: "0.05"
  openai_retries:
    required: false
    description: "How many times to retry OpenAI API"
    default: "5"
  openai_timeout_ms:
    required: false
    description: "Timeout for OpenAI API call in millis"
    default: "360000"
  openai_concurrency_limit:
    required: false
    description: "How many concurrent API calls to make to GitHub"
    default: "6"
  system_message:
    required: false
    description: "System message to be sent to OpenAI"
    default: ""
  summarize:
    required: false
    description: "The prompt for final summarization response"
    default: ""
  summarize_release_notes:
    required: false
    description: "The prompt for generating release notes"
    default: ""
  language:
    required: false
    description: "ISO code for the response language"
    default: "en-US"
  bot_icon:
    required: false
    description: "The icon for the bot"
    default: ""
  fail_on_requested_changes:
    required: false
    description: "Fail workflow if AI requests changes"
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Get PR diff
      shell: bash
      run: |
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        HEAD_REF="${{ github.event.pull_request.head.ref }}"
        git fetch origin "$BASE_REF" "$HEAD_REF"
        git diff "origin/$BASE_REF".."origin/$HEAD_REF" --no-color > diff.txt

    - name: Run goreviewer
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENROUTER_API_KEY: "${{ inputs.openai_api_key }}"
        PR_NUMBER: "${{ github.event.pull_request.number }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        DEBUG: "${{ inputs.debug }}"
      run: |
        cd goreviewer
        go build -o goreviewer .
        ./goreviewer run --pr "$PR_NUMBER" --repo "$REPO_FULL_NAME" --light-model "${{ inputs.openai_light_model }}" --heavy-model "${{ inputs.openai_heavy_model }}" --system-message "${{ inputs.system_message }}" --language "${{ inputs.language }}" --openai-base-url "${{ inputs.openai_base_url }}" < ../diff.txt
