name: GoReviewer
description: "AI-powered code reviewer using OpenAI API"
branding:
  icon: "git-merge"
  color: "purple"
author: "0x0Dx"

inputs:
  github_token:
    required: false
    description: "GitHub token for posting comments"
    default: "${{ github.token }}"
  openai_api_key:
    required: true
    description: "OpenAI API key"
    default: ""
  debug:
    required: false
    description: "Enable debug mode"
    default: "false"
  openai_base_url:
    required: false
    description: "OpenAI API base URL"
    default: "https://api.openai.com/v1"
  openai_light_model:
    required: false
    description: "Model for light tasks"
    default: "gpt-3.5-turbo"
  openai_heavy_model:
    required: false
    description: "Model for heavy tasks"
    default: "gpt-4"
  openai_model_temperature:
    required: false
    description: "Temperature for model"
    default: "0.05"
  openai_retries:
    required: false
    description: "Number of retries"
    default: "5"
  openai_timeout_ms:
    required: false
    description: "Timeout in milliseconds"
    default: "360000"
  system_message:
    required: false
    description: "Custom system message"
    default: ""
  summarize:
    required: false
    description: "Summarize prompt"
    default: ""
  language:
    required: false
    description: "Response language"
    default: "en-US"
  bot_icon:
    required: false
    description: "Bot icon (emoji or <img> tag)"
    default: '<img src="https://avatars.githubusercontent.com/in/347564?s=41" alt="Image description" width="20" height="20">'
  fail_on_requested_changes:
    required: false
    description: "Fail workflow if AI requests changes"
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - uses: actions/setup-go@v6.3.0
      with:
        cache: true
        go-version-file: './goreviewer/go.mod'
        cache-dependency-path: ./goreviewer/go.sum

    - name: Get PR number
      id: get_pr
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "COMMENT_BODY=${{ github.event.comment.body }}" >> $GITHUB_OUTPUT
        else
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "COMMENT_BODY=" >> $GITHUB_OUTPUT
        fi

    - name: Get PR diff
      id: get_diff
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        PR_NUMBER="${{ steps.get_pr.outputs.PR_NUMBER }}"
        REPO_FULL="${{ github.repository }}"
        
        # Get base and head refs
        BASE_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json baseRefName -q .baseRefName)
        HEAD_REF=$(gh pr view $PR_NUMBER --repo $REPO_FULL --json headRefName -q .headRefName)
        
        git fetch origin $BASE_REF $HEAD_REF
        git diff origin/$BASE_REF..origin/$HEAD_REF --no-color > diff.txt
        
        # Check if diff is empty
        if [ ! -s diff.txt ]; then
          echo "DIFF_EMPTY=true" >> $GITHUB_OUTPUT
        else
          echo "DIFF_EMPTY=false" >> $GITHUB_OUTPUT
        fi

    - name: Run review
      if: steps.get_diff.outputs.DIFF_EMPTY == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        PR_NUMBER: ${{ steps.get_pr.outputs.PR_NUMBER }}
        REPO_FULL_NAME: ${{ github.repository }}
        DEBUG: ${{ inputs.debug }}
      run: |
        cd goreviewer
        go build -o goreviewer .
        
        # Check if this is a /goreviewer command
        COMMENT_BODY="${{ steps.get_pr.outputs.COMMENT_BODY }}"
        if echo "$COMMENT_BODY" | grep -qi "^/goreviewer"; then
          # Extract question (remove /goreviewer command)
          QUESTION=$(echo "$COMMENT_BODY" | sed -e 's/^\/goreviewer//gi' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          echo "Question: $QUESTION"
          
          # Run review with diff and post as comment
          RESPONSE=$(cat ../diff.txt | ./goreviewer review \
            --pr "$PR_NUMBER" \
            --repo "$REPO_FULL_NAME" \
            --light-model "${{ inputs.openai_light_model }}" \
            --heavy-model "${{ inputs.openai_heavy_model }}" \
            --language "${{ inputs.language }}" \
            --openai-base-url "${{ inputs.openai_base_url }}" \
            2>/dev/null | jq -r '.review' || echo "Failed to get response")
          
          # Post response as comment
          gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" --body "$RESPONSE"
        else
          # Normal review
          ./goreviewer run \
            --pr "$PR_NUMBER" \
            --repo "$REPO_FULL_NAME" \
            --light-model "${{ inputs.openai_light_model }}" \
            --heavy-model "${{ inputs.openai_heavy_model }}" \
            --system-message '${{ inputs.system_message }}' \
            --language "${{ inputs.language }}" \
            --openai-base-url "${{ inputs.openai_base_url }}" \
            --bot-icon '${{ inputs.bot_icon }}' < ../diff.txt
        fi
