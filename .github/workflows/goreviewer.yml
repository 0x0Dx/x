name: GoReviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.repository }}-${{ github.event.number || github.head_ref || github.sha }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  goreviewer:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/goreviewer'))
    steps:
      - uses: ./goreviewer
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          openai_base_url: https://openrouter.ai/api/v1
          openai_light_model: arcee-ai/trinity-mini:free
          openai_heavy_model: arcee-ai/trinity-large-preview:free
