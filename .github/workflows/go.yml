name: Go

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-tags: true
          fetch-depth: 0
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: $HOME/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Build essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25.7'
      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: $HOME/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ github.ref }}-${{ hashFiles('**') }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ github.ref }}-
            ${{ runner.os }}-go-build-
      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: $HOME/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Taskfile.yml') }}
          restore-keys: ${{ runner.os }}-go-tools-
      - name: Install all tools needed
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          $HOME/go/bin/task install:tools
      - name: Run gofumpt for all packages
        run: $HOME/go/bin/task fmt
      - name: Run base linters for all packages
        run: $HOME/go/bin/task lint
      - name: Build all binaries
        run: $HOME/go/bin/task build
      - name: Run tests for all packages
        run: $HOME/go/bin/task test
