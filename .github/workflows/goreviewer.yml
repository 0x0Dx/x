name: GoReviewer

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  goreviewer:
    runs-on: ubuntu-latest
    steps:
      - name: Check event and comment
        id: check
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "Comment body: ${{ github.event.comment.body }}"
            echo "Issue PR URL: ${{ github.event.issue.pull_request.url }}"
          fi

      - name: Run on PR
        if: github.event_name == 'pull_request'
        uses: 0x0Dx/x/goreviewer@feat/support-comment-replies
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run on comment
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/goreviewer')
        uses: 0x0Dx/x/goreviewer@feat/support-comment-replies
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
