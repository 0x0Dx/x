<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="shortcut icon" href="/img/favicon.png" />
    <meta name="author" content="GitServer" />
    <meta name="description" content="GitServer" />
    <meta name="keywords" content="git" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://raw.githubusercontent.com/todc/todc-bootstrap/refs/heads/main/dist/css/todc-bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="/css/index.css" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">{{.AppName}}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/user/signin">Sign In</a></li>

          </ul>

      </div>

    <div class="container mt-4>
{{block "content" .}}
{{end}}
    </div>
    <footer class="footer mt-5 py-3 bg-light">
      <div class="container text-center">
        <span class="text-muted">© 2024 GitServer</span>
