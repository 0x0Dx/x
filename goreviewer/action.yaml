name: "AI Code Reviewer"
description: "AI-powered code reviewer using OpenAI API"
branding:
  icon: "git-merge"
  color: "purple"
author: "0x0Dx"

inputs:
  github_token:
    required: false
    description: "GitHub token for posting comments"
    default: "${{ github.token }}"
  openai_api_key:
    required: true
    description: "OpenAI API key"
    default: ""
  debug:
    required: false
    description: "Enable debug mode"
    default: "false"
  max_files:
    required: false
    description: "Max files to summarize and review. Less than or equal to 0 means no limit."
    default: "150"
  review_simple_changes:
    required: false
    description: "Review even when the changes are simple"
    default: "false"
  review_comment_lgtm:
    required: false
    description: "Leave comments even if the patch is LGTM"
    default: "false"
  path_filters:
    required: false
    description: |
      The path filters, e.g., "src/**.py", "!dist/**", each line will be considered as one pattern.
      See also

      - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore
      - https://github.com/isaacs/minimatch
    default: |
      !dist/**
      !**/*.app
      !**/*.bin
      !**/*.bz2
      !**/*.class
      !**/*.db
      !**/*.csv
      !**/*.tsv
      !**/*.dat
      !**/*.dll
      !**/*.dylib
      !**/*.egg
      !**/*.glif
      !**/*.gz
      !**/*.xz
      !**/*.zip
      !**/*.7z
      !**/*.rar
      !**/*.zst
      !**/*.ico
      !**/*.jar
      !**/*.tar
      !**/*.war
      !**/*.lo
      !**/*.log
      !**/*.mp3
      !**/*.wav
      !**/*.wma
      !**/*.mp4
      !**/*.avi
      !**/*.mkv
      !**/*.wmv
      !**/*.m4a
      !**/*.m4v
      !**/*.3gp
      !**/*.3g2
      !**/*.rm
      !**/*.mov
      !**/*.flv
      !**/*.iso
      !**/*.swf
      !**/*.flac
      !**/*.nar
      !**/*.o
      !**/*.ogg
      !**/*.otf
      !**/*.p
      !**/*.pdf
      !**/*.doc
      !**/*.docx
      !**/*.xls
      !**/*.xlsx
      !**/*.ppt
      !**/*.pptx
      !**/*.pkl
      !**/*.pickle
      !**/*.pyc
      !**/*.pyd
      !**/*.pyo
      !**/*.pub
      !**/*.pem
      !**/*.rkt
      !**/*.so
      !**/*.ss
      !**/*.eot
      !**/*.exe
      !**/*.pb.go
      !**/*.lock
      !**/*.ttf
      !**/*.cfg
      !**/*.toml
      !**/*.ini
      !**/*.mod
      !**/*.sum
      !**/*.work
      !**/*.json
      !**/*.mmd
      !**/*.svg
      !**/*.jpeg
      !**/*.jpg
      !**/*.png
      !**/*.gif
      !**/*.bmp
      !**/*.tiff
      !**/*.webm
      !**/*.woff
      !**/*.woff2
      !**/*.dot
      !**/*.md5sum
      !**/*.wasm
      !**/*.snap
      !**/*.parquet
      !**/gen/**
      !**/_gen/**
      !**/generated/**
      !**/@generated/**
      !**/vendor/**
      !**/*.min.js
      !**/*.min.js.map
      !**/*.min.js.css
      !**/*.tfstate
      !**/*.tfstate.backup
  disable_review:
    required: false
    description: "Only provide the summary and skip the code review."
    default: "false"
  disable_release_notes:
    required: false
    description: "Disable release notes"
    default: "false"
  openai_base_url:
    required: false
    description: "The url of the openai api interface."
    default: "https://api.openai.com/v1"
  openai_light_model:
    required: false
    description: "Model to use for simple tasks like summarizing diff on a file."
    default: "gpt-3.5-turbo"
  openai_heavy_model:
    required: false
    description: "Model to use for complex tasks such as code reviews."
    default: "gpt-4"
  openai_model_temperature:
    required: false
    description: "Temperature for GPT model"
    default: "0.05"
  openai_retries:
    required: false
    description: "How many times to retry OpenAI API in case of timeouts or errors?"
    default: "5"
  openai_timeout_ms:
    required: false
    description: "Timeout for OpenAI API call in millis"
    default: "360000"
  openai_concurrency_limit:
    required: false
    description: "How many concurrent API calls to make to OpenAI servers?"
    default: "6"
  github_concurrency_limit:
    required: false
    description: "How many concurrent API calls to make to GitHub?"
    default: "6"
  system_message:
    required: false
    description: "System message to be sent to OpenAI"
    default: |
      You are `@goreviewer` (aka `github-actions[bot]`), a language model 
      trained by OpenAI. Your purpose is to act as a highly experienced 
      software engineer and provide a thorough review of the code hunks
      and suggest code snippets to improve key areas such as:
        - Logic
        - Security
        - Performance
        - Data races
        - Consistency
        - Error handling
        - Maintainability
        - Modularity
        - Complexity
        - Optimization
        - Best practices: DRY, SOLID, KISS

      Do not comment on minor code style issues, missing 
      comments/documentation. Identify and resolve significant 
      concerns to improve overall code quality while deliberately 
      disregarding minor issues.
  summarize:
    required: false
    description: "The prompt for final summarization response"
    default: |
      Provide your final response in markdown with the following content:

      - **Walkthrough**: A high-level summary of the overall change instead of 
        specific files within 80 words.
      - **Changes**: A markdown table of files and their summaries. Group files 
        with similar changes together into a single row to save space.
      - **Poem**: Below the changes, include a whimsical, short poem written by 
        a rabbit to celebrate the changes. Format the poem as a quote using 
        the ">" symbol and feel free to use emojis where relevant.

      Avoid additional commentary as this summary will be added as a comment on the 
      GitHub pull request. Use the titles "Walkthrough" and "Changes" and they must be H2.
  summarize_release_notes:
    required: false
    description: "The prompt for generating release notes in the same chat as summarize stage"
    default: |
      Craft concise release notes for the pull request. 
      Focus on the purpose and user impact, categorizing changes as "New Feature", "Bug Fix", 
      "Documentation", "Refactor", "Style", "Test", "Chore", or "Revert". Provide a bullet-point list, 
      e.g., "- New Feature: Added search functionality to the UI". Limit your response to 50-100 words 
      and emphasize features visible to the end-user while omitting code-level details.
  language:
    required: false
    description: "ISO code for the response language"
    default: "en-US"
  bot_icon:
    required: false
    description: "The icon for the bot (emoji or <img> HTML tag)"
    default: '<img src="https://avatars.githubusercontent.com/u/126201299?s=41" alt="goreviewer" width="20" height="20">'
  fail_on_requested_changes:
    required: false
    description: "Fail workflow if AI requests changes"
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Get PR diff
      shell: bash
      run: |
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        HEAD_REF="${{ github.event.pull_request.head.ref }}"
        git fetch origin "$BASE_REF" "$HEAD_REF"
        git diff "origin/$BASE_REF".."origin/$HEAD_REF" --no-color > diff.txt

    - name: Check for /goreviewer command
      id: check_mention
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
          COMMENT_BODY="${{ github.event.comment.body }}"
          if echo "$COMMENT_BODY" | grep -qi "^/goreviewer"; then
            echo "MENTIONED=true" >> $GITHUB_OUTPUT
            echo "COMMENT_ID=${{ github.event.comment.id }}" >> $GITHUB_OUTPUT
            COMMENT_BODY_ESCAPED=$(echo "$COMMENT_BODY" | jq -Rs .)
            echo "COMMENT_BODY=$COMMENT_BODY_ESCAPED" >> $GITHUB_OUTPUT
            if [ -n "${{ github.event.comment.diff_hunk }}" ]; then
              DIFF_HUNK_ESCAPED=$(echo "${{ github.event.comment.diff_hunk }}" | jq -Rs .)
              echo "DIFF_HUNK=$DIFF_HUNK_ESCAPED" >> $GITHUB_OUTPUT
            fi
            if [ -n "${{ github.event.comment.path }}" ]; then
              echo "FILE_PATH=${{ github.event.comment.path }}" >> $GITHUB_OUTPUT
              echo "LINE=${{ github.event.comment.line }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "MENTIONED=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "MENTIONED=false" >> $GITHUB_OUTPUT
        fi

    - name: Run goreviewer
      if: steps.check_mention.outputs.MENTIONED == 'false'
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENAI_API_KEY: "${{ inputs.openai_api_key }}"
        PR_NUMBER: "${{ github.event.pull_request.number }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        DEBUG: "${{ inputs.debug }}"
      run: |
        cd goreviewer
        go build -o goreviewer .
        ./goreviewer run --pr "$PR_NUMBER" --repo "$REPO_FULL_NAME" --light-model "${{ inputs.openai_light_model }}" --heavy-model "${{ inputs.openai_heavy_model }}" --system-message '${{ inputs.system_message }}' --language "${{ inputs.language }}" --openai-base-url "${{ inputs.openai_base_url }}" --bot-icon '${{ inputs.bot_icon }}' < ../diff.txt

    - name: Respond to command
      if: steps.check_mention.outputs.MENTIONED == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENAI_API_KEY: "${{ inputs.openai_api_key }}"
        PR_NUMBER: "${{ github.event.pull_request.number }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        COMMENT_ID: "${{ steps.check_mention.outputs.COMMENT_ID }}"
        COMMENT_BODY: "${{ steps.check_mention.outputs.COMMENT_BODY }}"
      run: |
        cd goreviewer
        go build -o goreviewer .
        
        # Remove /goreviewer command from the question
        QUESTION=$(echo "$COMMENT_BODY" | jq -r . | sed -e 's/^\/goreviewer//gi' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
        
        # Run review with diff context, then post a new comment with the question answered
        RESPONSE=$(cat ../diff.txt | ./goreviewer review --pr "$PR_NUMBER" --repo "$REPO_FULL_NAME" --light-model "${{ inputs.openai_light_model }}" --heavy-model "${{ inputs.openai_heavy_model }}" --language "${{ inputs.language }}" --openai-base-url "${{ inputs.openai_base_url }}" 2>/dev/null | jq -r '.review' || echo "Failed to get response")
        
        # Post the response as a new comment
        gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" --body "$RESPONSE"
