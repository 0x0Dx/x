name: "AI Code Reviewer"
description: "AI-powered code reviewer using OpenRouter API"
branding:
  icon: "git-merge"
  color: "purple"
author: "0x0Dx"

inputs:
  debug:
    required: false
    description: "Enable debug mode"
    default: "false"
  max_files:
    required: false
    description: "Max files to summarize and review. Less than or equal to 0 means no limit."
    default: "150"
  review_simple_changes:
    required: false
    description: "Review even when the changes are simple"
    default: "false"
  review_comment_lgtm:
    required: false
    description: "Leave comments even if the patch is LGTM"
    default: "false"
  path_filters:
    required: false
    description: |
      The path filters, e.g., "**.go", "!bin/**", each line will be considered as one pattern
      See also

      - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpushpull_requestpull_request_targetpathspaths-ignore
      - https://github.com/isaacs/minimatch
    default: |
      !bin/**
      !dist/**
      !**/*.app
      !**/*.bin
      !**/*.bz2
      !**/*.class
      !**/*.db
      !**/*.cvs
      !**/*.tvs
      !**/*.dat
      !**/*.dll
      !**/*.dylib
      !**/*.egg
      !**/*.glif
      !**/*.gz
      !**/*.xz
      !**/*.zip
      !**/*.7z
      !**/*.rar
      !**/*.zst
      !**/*.ico
      !**/*.jar
      !**/*.tar
      !**/*.war
      !**/*.lo
      !**/*.log
      !**/*.mp3
      !**/*.wav
      !**/*.wma
      !**/*.mp4
      !**/*.avi
      !**/*.mkv
      !**/*.wmv
      !**/*.m4a
      !**/*.3pg
      !**/*.3p2
      !**/*.rm
      !**/*.mov
      !**/*.flv
      !**/*.iso
      !**/*.swf
      !**/*.flac
      !**/*.nar
      !**/*.o
      !**/*.ogg
      !**/*.otf
      !**/*.p
      !**/*.pdf
      !**/*.doc
      !**/*.docx
      !**/*.xls
      !**/*.xlsx
      !**/*.ppt
      !**/*.pptx
      !**/*.pkl
      !**/*.pickle
      !**/*.pyc
      !**/*.pyd
      !**/*.pyo
      !**/*.pub
      !**/*.pem
      !**/*.rkt
      !**/*.so
      !**/*.ss
      !**/*.eot
      !**/*.exe
      !**/*.pb.go
      !**/*.lock
      !**/*.ttf
      !**/*.yaml
      !**/*.yml
      !**/*.cfg
      !**/*.toml
      !**/*.ini
      !**/*.mod
      !**/*.sum
      !**/*.work
      !**/*.json
      !**/*.mmd
      !**/*.svg
      !**/*.jpeg
      !**/*.jpg
      !**/*.png
      !**/*.gif
      !**/*.bmp
      !**/*.tiff
      !**/*.webm
      !**/*.woff
      !**/*.woff2
      !**/*.dot
      !**/*.md5sum
      !**/*.wasm
      !**/*.snap
      !**/*.parquet
      !**/gen/**
      !**/_gen/**
      !**/generated/**
      !**/@generated/**
      !**/vendor/**
      !**/*.min.js
      !**/*.min.js.map
      !**/*.min.js.css
      !**/*.tfstate
      !**/*.tfstate.backup
  disable_review:
    required: false
    description: "Only provide the summary and skip the code review."
    default: "false"
  disable_release_notes:
    required: false
    description: "Disable release notes"
    default: "false"
  openai_base_url:
    required: false
    description: "The url of the openai api interface."
    default: "https://api.openai.com/v1"
  openai_light_model:
    required: false
    description: "Model to use for simple tasks like summarizing diff on a file."
    default: "gpt-3.5-turbo"
  openai_heavy_model:
    required: false
    description: "Model to use for complex tasks such as code reviews."
    default: "gpt-4"
  openai_model_temperature:
    required: false
    description: "Temperature for GPT model"
    default: "0.05"
  openai_retries:
    required: false
    description: "How many times to retry OpenAI API in case of timeouts or errors?"
    default: "5"
  openai_timeout_ms:
    required: false
    description: "Timeout for OpenAI API call in millis"
    default: "360000"
  openai_concurrency_limit:
    required: false
    description: "How many concurrent API calls to make to GitHub?"
    default: "6"
  system_message:
    required: false
    description: "System message to be sent to OpenAI"
    default: |
      You are `@goreviewer` (aka `github-actions[bot]`), a language model
      trained by OpenAI. Your perpose is to act as a highly experienced
      software engineer and provide a thorough review of the code hunks
      and suggest code snippets to improve key areas such as:
        - Logic
        - Security
        - Performance
        - Data races
        - Consistency
        - Error handling
        - Maintainability
        - Modularity
        - Complexity
        - Optimization
        - Best practices: DRY, SOLID, KISS
      
      Do not comment on minor code style issues, missing
      comments/documentation. Identify and resolve significant
      concerns to improve overall code quality while deliberately
      disregarding minor issues.
  summarize:
    required: false
    description: "The prompt for final summarization response"
    default: |
      Provide your final response in markdown with the following content:
      
      - **Walkthrough**: A high-level summary of the overall change instead of
        specific files within 80 words.
      - **Changes**: A markdown table of files and their summaries. Group files
        with similair changes together into a single row to save space.
      - **Poem**: Below the changes, include a whimsical, short poem written by
        a rabbit to celebrate the changes. Format the poem as a quote using
        the ">" symbol and feel free to use emojis where relevant.

      Avoid additional commentary as this summary will be added as a comment on the
      GitHub pull request. Use the titles "Walkthrough" and "Changes" and they must be H2.
  summarize_release_notes:
    required: false
    description: "The prompt for generating release notes in the same chat as summarize stage"
    default: |
      Craft concise release notes for the pull request.
      Focus on the perpose and user impact, categorizing changes as "New Feature", "Bug Fix",
      "Documentation", "Refactor", "Style", "Test", "Chore", or "Revert". Provide a bullet-point list,
      e.g., "- New Feature: Added search functionality to the UI". Limit your response to 50-100 words
      and emphasize features visible to the end-user while omitting code-level details.
  language:
    required: false
    description: ISO code for the response language
    default: en-US
  bot_icon:
    required: false
    description: "The icon for the bot"
    default: '<img src="https://avatars.githubusercontent.com/u/126201299?s=41" alt="Image description" width="20" height="20">'

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Get PR diff
      shell: bash
      run: |
        BASE_REF="${{ github.event.pull_request.base.ref }}"
        git fetch origin "$BASE_REF"
        git diff "origin/$BASE_REF"...HEAD --no-color > diff.txt
    - name: Setup goreviewer
      shell: bash
      run: |
        go install github.com/0x0Dx/x/goreviewer@latest
    - name: Run AI Code Review
      shell: bash
      env:
        GITHUB_TOKEN: "${{ inputs.github_token }}"
        OPENROUTER_API_KEY: "${{ inputs.openrouter_api_key }}"
        MODEL: "${{ inputs.model }}"
        TEMPERATURE: "${{ inputs.temperature }}"
        MAX_TOKENS: "${{ inputs.max_tokens }}"
        MAX_DIFF_SIZE: "${{ inputs.max_diff_size }}"
        EXCLUDE_PATTERNS: "${{ inputs.exclude_patterns }}"
        PR_NUMBER: "${{ github.event.pull_request.number }}"
        REPO_FULL_NAME: "${{ github.repository }}"
        DEBUG_MODE: "${{ inputs.debug }}"
        FAIL_ON_REQUESTED_CHANGES: "${{ inputs.fail_on_requested_changes }}"
      run: |
        set +e

        # Filter diff if patterns specified
        if [ -n "$EXCLUDE_PATTERNS" ]; then
          FILTERED_DIFF=$(mktemp)
          # Create grep pattern from comma-separated list
          PATTERN=$(echo "$EXCLUDE_PATTERNS" | sed 's/,/|/g')
          grep -v -E "diff --git a/($PATTERN) " diff.txt > "$FILTERED_DIFF" 2>/dev/null || true
          if [ -s "$FILTERED_DIFF" ]; then
            cat "$FILTERED_DIFF" > diff.txt
          fi
          rm -f "$FILTERED_DIFF"
        fi

        # Run goreviewer
        AI_RESPONSE=$(cat diff.txt | goreviewer review --model "$MODEL" --temperature "$TEMPERATURE" --max-tokens "$MAX_TOKENS")
        EXIT_CODE=$?

        if [ "$DEBUG_MODE" = "true" ]; then
          echo "=== RAW AI RESPONSE ==="
          echo "$AI_RESPONSE"
          echo "=== EXIT CODE: $EXIT_CODE ==="
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ AI reviewer failed with exit code $EXIT_CODE"
          echo "Response: $AI_RESPONSE"
          echo "$AI_RESPONSE" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F - 2>/dev/null || true
          exit 1
        fi

        if [ -z "$AI_RESPONSE" ]; then
          echo "❌ AI response is empty"
          exit 1
        fi

        # Validate JSON
        if ! echo "$AI_RESPONSE" | jq . >/dev/null 2>&1; then
          echo "⚠️ AI response is not valid JSON"
          echo "AI response could not be processed" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F - 2>/dev/null || true
          exit 1
        fi

        # Extract fields
        REVIEW=$(echo "$AI_RESPONSE" | jq -r '.review // "No review provided"')
        DECISION=$(echo "$AI_RESPONSE" | jq -r '.fail_pass_workflow // "uncertain"' | tr -d '\n\r' | xargs)

        # Post review comment
        echo "$REVIEW" | gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" -F -

        # Add labels
        for label in $(echo "$AI_RESPONSE" | jq -r '.labels_added[]? // empty' 2>/dev/null); do
          if [ -n "$label" ]; then
            gh label create "$label" --color "0366d6" --description "AI reviewer" 2>/dev/null || true
            gh issue edit "$PR_NUMBER" --add-label "$label" 2>/dev/null || true
          fi
        done

        # Store decision for next step
        echo "DECISION=$DECISION" >> "$GITHUB_OUTPUT"

        # Remove trigger label
        gh issue edit "$PR_NUMBER" --remove-label "ai_code_review" 2>/dev/null || true

        echo "✅ AI review completed. Decision: $DECISION"
    - name: Fail if requested
      if: inputs.fail_on_requested_changes == 'true'
      shell: bash
      env:
        DECISION: "${{ steps.review.outputs.DECISION }}"
      run: |
        if [ "$DECISION" = "fail" ]; then
          echo "❌ AI requested changes and fail_on_requested_changes is enabled"
          exit 1
        fi
    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f diff.txt
